<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>派對遊戲 · 默契猜猜 + 骰運氣</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --card-light: #f5f0e8;
    --ink: #2a2a2a;
    --muted: #8a8378;
    --line: #ece6dc;
    --accent: #e07856;       /* 主色：默契猜猜的橘紅 */
    --pink: #c75d7e;
    --purple: #7b6aa1;
    --red: #c54545;
    --green: #7a9e5f;
    --gold: #d4a84b;
    --blue: #6b8e9e;
    --soft-pink: #f7dde5;
    --soft-purple: #e4dff0;
    --soft-orange: #fce8df;
    --soft-blue: #dee9ed;
    --soft-gold: #f7ebcb;
    --soft-red: #fde0e0;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 0;
    overflow-x: hidden;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .menu-btn {
    background: none;
    border: none;
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
    padding: 6px 8px;
    line-height: 1;
    border-radius: 6px;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 600;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--ink);
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--line);
  }
  .btn-danger {
    background: var(--red);
    color: white;
  }
  .btn-accent {
    background: var(--accent);
    color: white;
  }
  .btn-small {
    padding: 8px 14px;
    font-size: 12px;
    width: auto;
  }

  /* Inputs */
  .input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: white;
    color: var(--ink);
    font-size: 15px;
    font-family: inherit;
  }
  .input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Question */
  .question {
    font-size: 19px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--ink);
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .option:active { opacity: 0.7; }
  .option.selected {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
    font-weight: 600;
  }

  /* Category tag */
  .cat-tag {
    display: inline-block;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Player chip */
  .player-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border-radius: 14px;
    background: var(--card-light);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .player-chip.me {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .player-chip.offline { opacity: 0.45; }
  .player-emoji { font-size: 16px; }
  .player-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  .player-dot.answered { background: var(--accent); }
  .player-dot.offline { background: var(--muted); }

  /* Timer */
  .timer-wrap { margin-bottom: 14px; }
  .timer-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
    margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .timer-bar {
    height: 6px; background: var(--line);
    border-radius: 3px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.95s linear, background-color 0.3s;
  }

  /* Banner */
  .banner {
    border-radius: 14px;
    padding: 14px 16px;
    text-align: center;
    font-weight: 700;
    margin-bottom: 14px;
    font-size: 14px;
  }
  .banner-drink {
    background: var(--soft-pink);
    color: var(--pink);
  }
  .banner-correct {
    background: #e6f0db;
    color: var(--green);
  }
  .banner-streak {
    background: var(--soft-orange);
    color: var(--accent);
  }

  /* Reveal row */
  .reveal-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    align-items: center;
  }
  .reveal-row:last-child { border-bottom: none; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal {
    background: white;
    border-radius: 18px;
    padding: 22px;
    max-width: 340px;
    width: 100%;
    color: var(--ink);
  }

  /* Emoji grid */
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .emoji-tile {
    aspect-ratio: 1;
    border: 2px solid var(--line);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    background: white;
  }
  .emoji-tile.selected {
    border-color: var(--accent);
    background: var(--soft-orange);
  }

  /* Ranking */
  .rank-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card-light);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 8px;
    align-items: center;
  }
  .rank-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--muted);
    width: 32px;
    text-align: center;
  }
  .rank-num.first { color: var(--gold); }
  .rank-num.second { color: #a8a8a8; }
  .rank-num.third { color: #b87333; }
  .rank-score {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Drink animation */
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .drink-icon {
    display: inline-block;
    animation: bounce 0.6s ease-in-out 2;
  }

  /* ============ Dice Game ============ */
  .dice-stage {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 16px;
    margin-bottom: 14px;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    perspective: 800px;
  }

  .dice {
    width: 50px;
    height: 50px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.6s cubic-bezier(0.3, 0.5, 0.4, 1);
  }
  .dice.rolling {
    animation: spin 0.4s linear infinite;
  }
  @keyframes spin {
    0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    50%  { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
    100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
  }

  .dice-face {
    position: absolute;
    width: 50px;
    height: 50px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 9px;
    display: grid;
    padding: 5px;
  }
  .dice-pip {
    width: 7px;
    height: 7px;
    background: var(--ink);
    border-radius: 50%;
    align-self: center;
    justify-self: center;
  }

  .dface-1 { grid-template-areas: ". . ." ". c ." ". . ."; }
  .dface-1 .dice-pip:nth-child(1) { grid-area: c; }
  .dface-2 { grid-template-areas: "a . ." ". . ." ". . b"; }
  .dface-2 .dice-pip:nth-child(1) { grid-area: a; }
  .dface-2 .dice-pip:nth-child(2) { grid-area: b; }
  .dface-3 { grid-template-areas: "a . ." ". b ." ". . c"; }
  .dface-3 .dice-pip:nth-child(1) { grid-area: a; }
  .dface-3 .dice-pip:nth-child(2) { grid-area: b; }
  .dface-3 .dice-pip:nth-child(3) { grid-area: c; }
  .dface-4 { grid-template-areas: "a . b" ". . ." "c . d"; }
  .dface-4 .dice-pip:nth-child(1) { grid-area: a; }
  .dface-4 .dice-pip:nth-child(2) { grid-area: b; }
  .dface-4 .dice-pip:nth-child(3) { grid-area: c; }
  .dface-4 .dice-pip:nth-child(4) { grid-area: d; }
  .dface-5 { grid-template-areas: "a . b" ". c ." "d . e"; }
  .dface-5 .dice-pip:nth-child(1) { grid-area: a; }
  .dface-5 .dice-pip:nth-child(2) { grid-area: b; }
  .dface-5 .dice-pip:nth-child(3) { grid-area: c; }
  .dface-5 .dice-pip:nth-child(4) { grid-area: d; }
  .dface-5 .dice-pip:nth-child(5) { grid-area: e; }
  .dface-6 { grid-template-areas: "a . b" "c . d" "e . f"; }
  .dface-6 .dice-pip:nth-child(1) { grid-area: a; }
  .dface-6 .dice-pip:nth-child(2) { grid-area: b; }
  .dface-6 .dice-pip:nth-child(3) { grid-area: c; }
  .dface-6 .dice-pip:nth-child(4) { grid-area: d; }
  .dface-6 .dice-pip:nth-child(5) { grid-area: e; }
  .dface-6 .dice-pip:nth-child(6) { grid-area: f; }

  .dice-face.front  { transform: translateZ(25px); }
  .dice-face.back   { transform: rotateY(180deg) translateZ(25px); }
  .dice-face.right  { transform: rotateY(90deg) translateZ(25px); }
  .dice-face.left   { transform: rotateY(-90deg) translateZ(25px); }
  .dice-face.top    { transform: rotateX(90deg) translateZ(25px); }
  .dice-face.bottom { transform: rotateX(-90deg) translateZ(25px); }

  .dice.killer-hit .dice-face {
    border-color: var(--accent);
    background: var(--soft-orange);
  }
  .dice.killer-hit .dice-pip {
    background: var(--accent);
  }

  .killer-card {
    background: var(--soft-orange);
    border: 1px dashed var(--accent);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 14px;
    text-align: center;
  }
  .killer-num {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  /* Misc */
  .center { text-align: center; }
  .muted { color: var(--muted); }
  .row { display: flex; gap: 8px; align-items: center; }
  .gap-tight { gap: 4px; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .small { font-size: 12px; }
  .tiny { font-size: 11px; }

</style>
</head>

// ============ Utility ============
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.setAttribute('style', v);
    else if (k.startsWith('on')) e[k] = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[m]);
}

function makeId(prefix) {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,7)}`;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============ Firestore ============
async function loadRoom() {
  const ref = doc(db, 'partyRooms', roomCode);
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : null;
}

async function saveRoom() {
  if (!roomCode || !state) return;
  const ref = doc(db, 'partyRooms', roomCode);
  await setDoc(ref, state);
}

function subscribeRoom() {
  if (unsub) unsub();
  const ref = doc(db, 'partyRooms', roomCode);
  unsub = onSnapshot(ref, async (snap) => {
    if (!snap.exists()) return;
    const fresh = snap.data();

    // 自動揭曉檢查：所有在線玩家都答完了、但還沒揭曉（只對 mochi 模式）
    if (fresh.gameType !== 'dice' && fresh.currentRound && !fresh.currentRound.revealed && fresh.status === 'playing') {
      const onlinePlayers = (fresh.players || []).filter(p => p.online);
      const answers = fresh.currentRound.answers || {};
      const allAnswered = onlinePlayers.length > 0 &&
                          onlinePlayers.every(p => answers[p.id]);
      if (allAnswered) {
        const firstId = onlinePlayers
          .map(p => p.id).sort()[0];
        if (firstId === myPlayerId) {
          state = fresh;
          doReveal();
          await saveRoom();
          return;
        }
      }
    }

    // Dice fallback: 如果擲骰狀態超過 4 秒沒結束（主玩家可能離開），由其他在線玩家觸發
    if (fresh.gameType === 'dice' && fresh.diceState && fresh.diceState.rolling) {
      const stuck = Date.now() - (fresh.diceState.rollTimestamp || 0) > 4000;
      if (stuck) {
        const onlineIds = (fresh.players || []).filter(p => p.online).map(p => p.id).sort();
        if (onlineIds[0] === myPlayerId) {
          state = fresh;
          // 由我代為結束動畫
          setTimeout(() => finishRollAnimation(), 100);
        }
      }
    }

    state = fresh;
    render();
  }, (error) => {
    // 顯示連線錯誤
    console.error('Firestore subscribe error:', error);
    const app = document.getElementById('app');
    app.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = 'padding:24px;text-align:center;background:var(--soft-pink);';
    card.innerHTML = `
      <div style="font-size:32px;margin-bottom:8px;">⚠️</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;">連線到房間失敗</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px;">${escapeHtml(error.message || '未知錯誤')}</div>
      <div style="font-size:12px;color:var(--ink);line-height:1.6;text-align:left;background:var(--card);padding:12px;border-radius:8px;">
        <b>可能原因：</b><br>
        1. Firebase Firestore Rules 還沒開放 partyRooms<br>
        2. 網路問題<br><br>
        <b>解法：</b><br>
        到 Firebase Console → Firestore → Rules，加上 partyRooms 規則：<br>
        <code style="background:var(--bg);padding:6px;display:block;margin-top:6px;border-radius:6px;font-size:11px;">match /partyRooms/{roomId} {<br>&nbsp;&nbsp;allow read, write: if true;<br>}</code>
      </div>
      <button class="btn btn-ghost" style="margin-top:14px;" onclick="location.reload()">重新整理</button>
    `;
    app.appendChild(card);
  });
}

// ============ Helpers ============
function getMe() {
  if (!state || !state.players || !myPlayerId) return null;
  return state.players.find(p => p.id === myPlayerId);
}

function getPlayer(playerId) {
  if (!state || !state.players) return null;
  return state.players.find(p => p.id === playerId);
}

function customConfirm(message, opts = {}) {
  return new Promise((resolve) => {
    const old = document.getElementById('confirm-modal');
    if (old) old.remove();
    const overlay = el('div', {
      id: 'confirm-modal',
      class: 'modal-overlay'
    });
    const modal = el('div', { class: 'modal' });
    modal.appendChild(el('div', { style: 'font-size:15px;line-height:1.6;margin-bottom:18px;white-space:pre-wrap;' }, message));
    const row = el('div', { style: 'display:flex;gap:8px;' });
    const cancel = el('button', {
      class: 'btn btn-ghost',
      style: 'flex:1;',
      onclick: () => { overlay.remove(); resolve(false); }
    }, opts.cancelText || '取消');
    const ok = el('button', {
      class: opts.danger ? 'btn btn-danger' : 'btn',
      style: 'flex:1;',
      onclick: () => { overlay.remove(); resolve(true); }
    }, opts.okText || '確定');
    row.appendChild(cancel);
    row.appendChild(ok);
    modal.appendChild(row);
    overlay.appendChild(modal);
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
    document.body.appendChild(overlay);
  });
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (!roomCode) {
    app.appendChild(renderRoomEntry());
    return;
  }

  if (!state) {
    app.appendChild(el('div', { class: 'card center' }, '連線中…'));
    return;
  }

  if (!myPlayerId || !getMe()) {
    app.appendChild(renderJoinForm());
    return;
  }

  app.appendChild(renderHeader());

  if (state.status === 'ended') {
    app.appendChild(renderEnded());
  } else if (state.status === 'waiting') {
    // 等待中：依 gameType 顯示對應 lobby、如果沒選遊戲就顯示主選單
    if (!state.gameType) {
      app.appendChild(renderGameSelect());
    } else {
      app.appendChild(renderWaiting());
    }
  } else if (state.status === 'playing') {
    if (state.gameType === 'dice') {
      app.appendChild(renderDicePlaying());
    } else if (state.gameType === 'quiz') {
      app.appendChild(renderQuizPlaying());
    } else {
      app.appendChild(renderPlaying());  // 預設 mochi
    }
  }
}

  const diceText = el('div', { style: 'flex:1;' });
  diceText.appendChild(el('div', { style: 'font-size:15px;font-weight:700;margin-bottom:2px;' }, '骰運氣'));
  diceText.appendChild(el('div', { style: 'font-size:12px;color:var(--muted);line-height:1.5;' }, '骰到殺手數字就喝一口、5 輪結束看誰喝最多'));
  dice.appendChild(diceText);
  games.appendChild(dice);

  wrap.appendChild(games);

  // === 建立新房間 ===
  const createCard = el('div', { class: 'card' });
  createCard.appendChild(el('div', { class: 'label' }, '我要建房間'));
  createCard.appendChild(el('div', {
    style: 'font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;'
  }, '系統會自動生成代碼、你再傳給朋友'));
  const createBtn = el('button', {
    class: 'btn',
    onclick: async () => {
      // 自動生成 4-5 字隨機代碼
      const chars = 'abcdefghijkmnpqrstuvwxyz23456789'; // 排除易混淆字
      let code = '';
      for (let i = 0; i < 4; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      createBtn.disabled = true;
      createBtn.textContent = '建立中...';
      try {
        await enterRoom(code);
      } catch (e) {
        alert('建立失敗：' + (e.message || '未知錯誤'));
        createBtn.disabled = false;
        createBtn.textContent = '✨ 建立新房間';
      }
    }
  }, '✨ 建立新房間');
  createCard.appendChild(createBtn);
  wrap.appendChild(createCard);

  // === 加入既有房間 ===
  const joinCard = el('div', { class: 'card' });
  joinCard.appendChild(el('div', { class: 'label' }, '加入朋友的房間'));
  const lastRoom = loadLastRoom();
  const codeInput = el('input', {
    class: 'input',
    style: 'text-align:center;letter-spacing:4px;font-size:20px;font-weight:700;text-transform:lowercase;',
    placeholder: '輸入代碼',
    maxlength: '10',
    value: lastRoom
  });
  joinCard.appendChild(codeInput);

  const joinBtn = el('button', {
    class: 'btn btn-ghost',
    style: 'margin-top:10px;',
    onclick: async () => {
      const code = codeInput.value.trim().toLowerCase();
      if (!code) { alert('請輸入房間代碼'); return; }
      if (code.length < 3) { alert('代碼至少 3 個字'); return; }
      if (!/^[a-z0-9]+$/.test(code)) { alert('只能用英文字母和數字'); return; }
      joinBtn.disabled = true;
      joinBtn.textContent = '加入中...';
      try {
        await enterRoom(code);
      } catch (e) {
        alert('加入失敗：' + (e.message || '未知錯誤'));
        joinBtn.disabled = false;
        joinBtn.textContent = '加入房間';
      }
    }
  }, '加入房間');
  joinCard.appendChild(joinBtn);

  wrap.appendChild(joinCard);

  return wrap;
}

// ============ Render: Join Form (set name + emoji) ============
function renderJoinForm() {
  const wrap = el('div');

  // 顯示已在房間的玩家
  if (state.players && state.players.length > 0) {
    const list = el('div', { class: 'card' });
    list.appendChild(el('div', { class: 'label' }, `已加入（${state.players.length}）`));
    const players = el('div', { style: 'display:flex;flex-wrap:wrap;gap:6px;' });
    state.players.forEach(p => {
      players.appendChild(el('div', { class: 'player-chip' + (p.online ? '' : ' offline') },
        el('span', { class: 'player-emoji' }, p.emoji),
        el('span', {}, p.name)
      ));
    });
    list.appendChild(players);
    wrap.appendChild(list);
  }

  // Form
  const form = el('div', { class: 'card' });
  form.appendChild(el('div', { class: 'label' }, '設定你的暱稱和頭像'));

  let chosenEmoji = PRESET_EMOJIS[Math.floor(Math.random() * PRESET_EMOJIS.length)];

  // 暱稱輸入
  const nameInput = el('input', {
    class: 'input',
    placeholder: '取個名字（最多 10 字）',
    maxlength: '10',
    style: 'margin-bottom:16px;'
  });
  form.appendChild(nameInput);

  // Emoji 選擇
  form.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px;' }, '選一個頭像'));
  const grid = el('div', { class: 'emoji-grid' });

  function renderTiles() {
    grid.innerHTML = '';
    PRESET_EMOJIS.forEach(emoji => {
      const tile = el('div', {
        class: 'emoji-tile' + (emoji === chosenEmoji ? ' selected' : ''),
        onclick: () => {
          chosenEmoji = emoji;
          customInput.value = '';
          renderTiles();
        }
      }, emoji);
      grid.appendChild(tile);
    });
  }
  renderTiles();
  form.appendChild(grid);

  const customInput = el('input', {
    class: 'input',
    style: 'margin-top:10px;text-align:center;font-size:22px;',
    placeholder: '或自訂 emoji',
    maxlength: '20',
    oninput: function() {
      const v = this.value.trim();
      if (v) {
        chosenEmoji = v;
        renderTiles();
      }
    }
  });
  form.appendChild(customInput);

  const joinBtn = el('button', {
    class: 'btn',
    style: 'margin-top:16px;',
    onclick: async () => {
      const name = nameInput.value.trim();
      if (!name) { alert('要先取個名字喔'); return; }
      if (state.status !== 'waiting') {
        alert('遊戲已開始，等這場結束再加入吧');
        return;
      }
      if (state.players && state.players.length >= 5) {
        alert('房間已滿（最多 5 人）');
        return;
      }
      joinBtn.disabled = true;
      joinBtn.textContent = '加入中...';
      try {
        await joinAsPlayer(name, chosenEmoji);
      } catch (e) {
        alert('加入失敗：' + (e.message || '未知錯誤'));
        joinBtn.disabled = false;
        joinBtn.textContent = '加入房間';
      }
    }
  }, '加入房間');
  form.appendChild(joinBtn);

  // 離開房間
  const leaveBtn = el('button', {
    class: 'btn btn-ghost',
    style: 'margin-top:8px;',
    onclick: () => leaveRoom()
  }, '離開');
  form.appendChild(leaveBtn);

  wrap.appendChild(form);
  return wrap;
}

// ============ Render: Waiting (lobby) ============
function renderWaiting() {
  const wrap = el('div');

  // 顯示已選遊戲
  let gameInfo;
  if (state.gameType === 'dice') {
    gameInfo = { icon: '🎲', name: '骰運氣', desc: '骰到殺手數字就喝一口' };
  } else if (state.gameType === 'quiz') {
    gameInfo = { icon: '🧠', name: '做題目', desc: '國文 / 英文 / 冷知識 · 15 題' };
  } else {
    gameInfo = { icon: '💭', name: '默契猜猜', desc: '猜每個人會選哪個' };
  }
  const gameCard = el('div', {
    class: 'card',
    style: 'background:var(--soft-orange);display:flex;align-items:center;gap:12px;'
  });
  gameCard.appendChild(el('span', { style: 'font-size:28px;' }, gameInfo.icon));
  const gInfo = el('div', { style: 'flex:1;' });
  gInfo.appendChild(el('div', { style: 'font-size:14px;font-weight:700;' }, gameInfo.name));
  gInfo.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);margin-top:2px;' }, gameInfo.desc));
  gameCard.appendChild(gInfo);
  const changeBtn = el('button', {
    class: 'btn-ghost',
    style: 'padding:6px 12px;font-size:12px;border-radius:8px;background:white;border:1px solid var(--line);color:var(--ink);cursor:pointer;font-family:inherit;',
    onclick: async () => {
      const fresh = await loadRoom();
      if (!fresh) return;
      state = fresh;
      delete state.gameType;
      state.currentRound = null;
      state.diceState = null;
      state.quizState = null;
      // 保留 usedIndices / usedQuizIndices 跨遊戲也避免重複出題
      state.history = [];
      state.players.forEach(p => { p.score = 0; p.streak = 0; p.drinks = 0; });
      await saveRoom();
      render();
    }
  }, '換遊戲');
  gameCard.appendChild(changeBtn);
  wrap.appendChild(gameCard);

  const card = el('div', { class: 'card' });
  card.appendChild(el('div', { class: 'label' }, `玩家（${state.players.length} / 5）`));

  state.players.forEach(p => {
    const isMe = p.id === myPlayerId;
    const row = el('div', {
      style: 'display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);'
    });
    row.appendChild(el('span', { style: 'font-size:24px;' }, p.emoji));
    row.appendChild(el('div', { style: 'flex:1;font-weight:600;' }, p.name + (isMe ? ' (你)' : '')));
    row.appendChild(el('span', {
      class: 'player-dot ' + (p.online ? '' : 'offline')
    }));
    row.appendChild(el('span', {
      style: 'font-size:11px;color:var(--muted);width:36px;'
    }, p.online ? '在線' : '離線'));
    card.appendChild(row);
  });
  if (card.lastChild) card.lastChild.style.borderBottom = 'none';

  wrap.appendChild(card);

  // 分享提示
  const tip = el('div', { class: 'card', style: 'text-align:center;background:var(--soft-purple);' });
  tip.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;' }, '分享給朋友'));
  tip.appendChild(el('div', { style: 'font-size:18px;font-weight:700;letter-spacing:3px;color:var(--accent);' }, roomCode.toUpperCase()));
  tip.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);margin-top:6px;' }, '叫朋友輸入這個代碼就能進來'));
  wrap.appendChild(tip);

  // 開始按鈕
  if (state.players.length >= 2) {
    const startBtn = el('button', {
      class: 'btn',
      onclick: async () => {
        startBtn.disabled = true;
        startBtn.textContent = '開始中...';
        try { await startGame(); }
        catch (e) {
          alert('開始失敗：' + e.message);
          startBtn.disabled = false;
          startBtn.textContent = '開始遊戲';
        }
      }
    }, '開始遊戲');
    wrap.appendChild(startBtn);
  } else {
    wrap.appendChild(el('div', {
      style: 'text-align:center;color:var(--muted);padding:14px;font-size:13px;'
    }, '至少要 2 個人才能開始'));

// ============ Render: Playing ============
function renderPlaying() {
  const wrap = el('div');
  const round = state.currentRound;
  if (!round) {
    wrap.appendChild(el('div', { class: 'card center' }, '抽題中…'));
    return wrap;
  }

  const me = getMe();
  const myAnswer = round.answers && round.answers[myPlayerId];

  // 揭曉狀態
  if (round.revealed) {
    stopCountdown();
    myRoundStartedQ = null;
    wrap.appendChild(renderReveal(round));
    return wrap;
  }

  // 我已答完，等其他人
  if (myAnswer) {
    stopCountdown();
    return renderWaitingForOthers(round);
  }

  // 還沒答 → 答題介面
  wrap.appendChild(renderAnswerForm(round));
  return wrap;
}

// ============ Render: Answer Form ============
function renderAnswerForm(round) {
  const wrap = el('div');

  // 取得所有「其他玩家」（不含自己），按 id 排序保持一致順序
  const otherPlayers = state.players.filter(p => p.id !== myPlayerId);

  // 換新題清掉暫存
  if (myRoundStartedQ !== round.questionIdx) {
    pendingAnswer = null;
    pendingGuesses = {};
    myRoundStartTime = null;
  }

  // Timer
  const timerWrap = el('div', { class: 'timer-wrap' });
  const timerLabel = el('div', { class: 'timer-label' });
  const timerText = el('span', {}, '⏱️ 剩餘時間');
  const timerCount = el('span', { style: 'font-weight:700;color:var(--ink);' }, `${getRoundTime()}s`);
  timerLabel.appendChild(timerText);
  timerLabel.appendChild(timerCount);
  timerWrap.appendChild(timerLabel);
  const timerBar = el('div', { class: 'timer-bar' });
  const timerFill = el('div', { class: 'timer-fill', style: 'width:100%;background:var(--green);' });
  timerBar.appendChild(timerFill);
  timerWrap.appendChild(timerLabel);
  timerWrap.appendChild(timerBar);
  wrap.appendChild(timerWrap);

  // 題目卡
  const qCard = el('div', { class: 'card' });
  const catInfo = CATEGORIES[round.question.cat] || CATEGORIES.dilemma;
  const topRow = el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;' });
  topRow.appendChild(el('span', {
    class: 'cat-tag',
    style: `background:${catInfo.bg};color:${catInfo.color};`
  }, catInfo.name));
  topRow.appendChild(el('span', { style: 'font-size:11px;color:var(--muted);' }, `第 ${round.roundNum} 題`));
  qCard.appendChild(topRow);
  qCard.appendChild(el('div', { class: 'question' }, round.question.q));
  wrap.appendChild(qCard);

  // 進度說明
  wrap.appendChild(el('div', {
    style: 'font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;'
  }, `要答 1 題自己 + 猜 ${otherPlayers.length} 位玩家`));

  // Step 1: 自己會選
  const step1 = el('div', { class: 'card' });
  step1.appendChild(el('div', { class: 'label' }, '1. 你自己會選？'));
  const opts1 = el('div', { class: 'options' });
  ['a', 'b'].forEach(key => {
    const btn = el('button', {
      class: 'option' + (pendingAnswer === key ? ' selected' : ''),
      onclick: () => {
        pendingAnswer = key;
        opts1.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        btn.classList.add('selected');
        updateSubmit();
      }
    }, round.question[key]);
    opts1.appendChild(btn);
  });
  step1.appendChild(opts1);
  wrap.appendChild(step1);

  // Step 2+: 對每位其他玩家猜
  otherPlayers.forEach((other, idx) => {
    const step = el('div', { class: 'card' });
    step.appendChild(el('div', { class: 'label' },
      `${idx + 2}. 猜 ${other.emoji} ${other.name} 會選？`));
    const opts = el('div', { class: 'options' });
    ['a', 'b'].forEach(key => {
      const btn = el('button', {
        class: 'option' + (pendingGuesses[other.id] === key ? ' selected' : ''),
        onclick: () => {
          pendingGuesses[other.id] = key;
          opts.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
          btn.classList.add('selected');
          updateSubmit();
        }
      }, round.question[key]);
      opts.appendChild(btn);
    });
    step.appendChild(opts);
    wrap.appendChild(step);
  });

  const submitBtn = el('button', {
    class: 'btn',
    onclick: () => {
      if (!isAllFilled()) return;
      stopCountdown();
      const a = pendingAnswer;
      const g = { ...pendingGuesses };
      pendingAnswer = null;
      pendingGuesses = {};
      submitMyAnswer(a, g);
    }
  }, '送出');
  if (!isAllFilled()) {
    submitBtn.setAttribute('disabled', 'true');
  }
  wrap.appendChild(submitBtn);

  function isAllFilled() {
    if (!pendingAnswer) return false;
    return otherPlayers.every(p => pendingGuesses[p.id]);
  }
  function updateSubmit() {
    if (isAllFilled()) submitBtn.removeAttribute('disabled');
    else submitBtn.setAttribute('disabled', 'true');
  }

  // 啟動倒數
  if (myRoundStartedQ !== round.questionIdx) {
    myRoundStartedQ = round.questionIdx;
    myRoundStartTime = Date.now();
  }
  startCountdown(timerFill, timerCount);

  return wrap;
}

function renderWaitingForOthers(round) {
  const wrap = el('div');

  const card = el('div', { class: 'card', style: 'text-align:center;padding:30px 20px;' });
  card.appendChild(el('div', { style: 'font-size:32px;margin-bottom:10px;' }, '⌛'));
  card.appendChild(el('div', { style: 'font-size:15px;font-weight:600;margin-bottom:8px;' }, '等其他人答題中…'));

  // 顯示誰答了誰沒答
  const list = el('div', { style: 'display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;' });
  state.players.forEach(p => {
    const answered = round.answers && round.answers[p.id];
    const chip = el('div', { class: 'player-chip' + (p.online ? '' : ' offline') });
    chip.appendChild(el('span', { class: 'player-emoji' }, p.emoji));
    chip.appendChild(el('span', {}, p.name));
    chip.appendChild(el('span', {
      class: 'player-dot ' + (answered ? 'answered' : ''),
      style: answered ? '' : 'background:var(--muted);'
    }));
    list.appendChild(chip);
  });
  card.appendChild(list);

  wrap.appendChild(card);
  return wrap;
}

// ============ Render: Reveal ============
function renderReveal(round) {
  const wrap = el('div');

  const myAnswer = round.answers[myPlayerId];
  const otherPlayers = state.players.filter(p => p.id !== myPlayerId);

  // 計算我這輪猜對幾個
  let myCorrect = 0;
  let myGuessable = 0;
  if (myAnswer && !myAnswer.timeout) {
    const myGuesses = myAnswer.guesses || {};
    otherPlayers.forEach(other => {
      const otherAns = round.answers[other.id];
      if (!otherAns || otherAns.timeout || otherAns.answer == null) return;
      myGuessable++;
      if (myGuesses[other.id] === otherAns.answer) myCorrect++;
    });
  }
  const myPerfect = myGuessable > 0 && myCorrect === myGuessable;

  // Banner
  if (myPerfect) {
    wrap.appendChild(el('div', { class: 'banner banner-streak' },
      `🎯 完美！全部猜對 (+${myCorrect + 2} 分)`));
  } else if (myCorrect > 0) {
    wrap.appendChild(el('div', { class: 'banner banner-correct' },
      `✓ 猜對 ${myCorrect} / ${myGuessable} 個 (+${myCorrect} 分)`));
  } else if (myAnswer) {
    wrap.appendChild(el('div', { class: 'banner banner-drink' },
      el('span', { class: 'drink-icon' }, '🍻'),
      ` 一個都沒猜中、喝一口！`
    ));
  }

  // 題目重現 + 每人選了什麼
  const qCard = el('div', { class: 'card' });
  const catInfo = CATEGORIES[round.question.cat] || CATEGORIES.dilemma;
  qCard.appendChild(el('span', {
    class: 'cat-tag',
    style: `background:${catInfo.bg};color:${catInfo.color};margin-bottom:8px;display:inline-block;`
  }, catInfo.name));
  qCard.appendChild(el('div', { class: 'question', style: 'margin-bottom:14px;' }, round.question.q));
  qCard.appendChild(el('div', { class: 'label' }, '每個人選了'));
  state.players.forEach(p => {
    const ans = round.answers[p.id];
    const row = el('div', {
      style: 'display:grid;grid-template-columns:auto 1fr;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:center;'
    });
    row.appendChild(el('div', { style: 'display:flex;align-items:center;gap:6px;font-weight:700;' },
      el('span', { style: 'font-size:18px;' }, p.emoji),
      el('span', {}, p.name + (p.id === myPlayerId ? ' (你)' : ''))
    ));
    if (ans && ans.answer != null) {
      const chose = ans.answer === 'a' ? round.question.a : round.question.b;
      const cell = el('div', {}, el('b', {}, chose));
      if (ans.timeout) {
        cell.appendChild(el('span', { style: 'color:var(--red);font-size:11px;margin-left:6px;' }, '⏱️ 超時'));
      }
      row.appendChild(cell);
    } else {
      row.appendChild(el('div', { style: 'color:var(--muted);' }, ans && ans.timeout ? '⏱️ 超時沒答' : '沒答到'));
    }
    qCard.appendChild(row);
  });
  if (qCard.lastChild) qCard.lastChild.style.borderBottom = 'none';
  wrap.appendChild(qCard);

  // 「我的猜測對照」
  if (myAnswer) {
    const myGuessCard = el('div', { class: 'card' });
    myGuessCard.appendChild(el('div', { class: 'label' }, '你的猜測'));
    const myGuesses = myAnswer.guesses || {};
    otherPlayers.forEach(other => {
      const otherAns = round.answers[other.id];
      const myGuess = myGuesses[other.id];
      const row = el('div', {
        style: 'display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:center;'
      });
      row.appendChild(el('div', { style: 'display:flex;align-items:center;gap:6px;font-weight:600;' },
        el('span', { style: 'font-size:16px;' }, other.emoji),
        el('span', {}, other.name)
      ));
      const detail = el('div', { style: 'font-size:12px;color:var(--muted);line-height:1.5;' });
      if (myGuess && otherAns && !otherAns.timeout && otherAns.answer != null) {
        const guessed = myGuess === 'a' ? round.question.a : round.question.b;
        const actual = otherAns.answer === 'a' ? round.question.a : round.question.b;
        detail.innerHTML = `猜 <b>${escapeHtml(guessed)}</b> · 實際 <b>${escapeHtml(actual)}</b>`;
      } else if (!myGuess) {
        detail.innerHTML = '<span style="color:var(--muted);">沒猜</span>';
      } else {
        detail.innerHTML = '<span style="color:var(--muted);">對方沒答</span>';
      }
      row.appendChild(detail);
      const isCorrect = myGuess && otherAns && !otherAns.timeout
        && otherAns.answer != null && myGuess === otherAns.answer;
      const isWrong = myGuess && otherAns && !otherAns.timeout
        && otherAns.answer != null && myGuess !== otherAns.answer;
      if (isCorrect) {
        row.appendChild(el('span', { style: 'color:var(--green);font-size:18px;font-weight:700;' }, '✓'));
      } else if (isWrong) {
        row.appendChild(el('span', { style: 'color:var(--red);font-size:18px;font-weight:700;' }, '✗'));
      } else {
        row.appendChild(el('span', { style: 'color:var(--muted);' }, '—'));
      }
      myGuessCard.appendChild(row);
    });
    if (myGuessCard.lastChild) myGuessCard.lastChild.style.borderBottom = 'none';
    wrap.appendChild(myGuessCard);
  }

  // 即時排行
  const ranked = [...state.players].sort((a, b) => (b.score || 0) - (a.score || 0));
  const rankCard = el('div', { class: 'card' });
  rankCard.appendChild(el('div', { class: 'label' }, '目前排名'));
  ranked.forEach((p, i) => {
    const row = el('div', { style: 'display:flex;justify-content:space-between;padding:6px 0;font-size:13px;' });
    row.appendChild(el('div', {},
      el('span', { style: 'color:var(--muted);margin-right:8px;' }, `${i + 1}.`),
      el('span', { style: 'font-size:16px;margin-right:4px;' }, p.emoji),
      el('span', {}, p.name + (p.id === myPlayerId ? ' (你)' : ''))
    ));
    const scoreSpan = el('span', { style: 'font-weight:700;color:var(--accent);' }, `${p.score || 0} 分`);
    if (p.lastPerfect) {
      scoreSpan.textContent = `🎯 ${p.score || 0} 分`;
    }
    row.appendChild(scoreSpan);
    rankCard.appendChild(row);
  });
  wrap.appendChild(rankCard);

  // 下一題按鈕
  const nextBtn = el('button', {
    class: 'btn',
    onclick: async () => {
      nextBtn.disabled = true;
      nextBtn.textContent = '抽題中...';
      try { await nextRound(); }
      catch (e) {
        alert('抽題失敗：' + e.message);
        nextBtn.disabled = false;
        nextBtn.textContent = '下一題';
      }
    }
  }, '下一題');
  wrap.appendChild(nextBtn);

  // 結束按鈕
  const endBtn = el('button', {
    class: 'btn btn-ghost',
    style: 'margin-top:8px;',
    onclick: async () => {
      if (await customConfirm('要結束這場遊戲嗎？', { okText: '結束', danger: true })) {
        await endGame();
      }
    }
  }, '結束遊戲');
  wrap.appendChild(endBtn);

  return wrap;
}

// ============ Render: Dice Game ============
const DICE_ROTATIONS = {
  1: 'rotateX(0deg) rotateY(0deg)',
  6: 'rotateX(0deg) rotateY(180deg)',
  3: 'rotateX(0deg) rotateY(-90deg)',
  4: 'rotateX(0deg) rotateY(90deg)',
  5: 'rotateX(-90deg) rotateY(0deg)',
  2: 'rotateX(90deg) rotateY(0deg)'
};

function makeDicePips(n) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push(el('div', { class: 'dice-pip' }));
  }
  return arr;
}

function makeDiceFace(value, position) {
  const face = el('div', { class: `dice-face ${position} dface-${value}` });
  makeDicePips(value).forEach(p => face.appendChild(p));
  return face;
}

function makeDiceEl(showValue, isKillerHit) {
  const dice = el('div', { class: 'dice' + (isKillerHit ? ' killer-hit' : '') });
  // 六面：用固定的對應（demo 一致）
  dice.appendChild(makeDiceFace(1, 'front'));
  dice.appendChild(makeDiceFace(6, 'back'));
  dice.appendChild(makeDiceFace(3, 'right'));
  dice.appendChild(makeDiceFace(4, 'left'));
  dice.appendChild(makeDiceFace(5, 'top'));
  dice.appendChild(makeDiceFace(2, 'bottom'));

  // 直接轉到目標值（不動畫）
  if (showValue && DICE_ROTATIONS[showValue]) {
    dice.style.transform = DICE_ROTATIONS[showValue];
  }
  return dice;
}

let lastRollTimestamp = 0;  // 記憶上次處理過哪次擲骰，避免重複動畫

function renderDicePlaying() {
  const wrap = el('div');
  const ds = state.diceState;
  if (!ds) {
    wrap.appendChild(el('div', { class: 'card center' }, '初始化遊戲中…'));
    return wrap;
  }

  const turnPlayer = getCurrentTurnPlayer();
  const isMyTurn = turnPlayer && turnPlayer.id === myPlayerId;

  // Header info
  const infoCard = el('div', { class: 'card', style: 'display:flex;justify-content:space-between;align-items:center;' });
  infoCard.appendChild(el('div', {},
    el('div', { style: 'font-size:11px;color:var(--muted);letter-spacing:1px;' }, '回合'),
    el('div', { style: 'font-size:18px;font-weight:700;margin-top:2px;' }, `Round ${ds.roundNum} / 5`)
  ));
  infoCard.appendChild(el('div', { style: 'text-align:right;' },
    el('div', { style: 'font-size:11px;color:var(--muted);letter-spacing:1px;' }, '骰子'),
    el('div', { style: 'font-size:18px;font-weight:700;margin-top:2px;' }, `🎲 ${ds.diceCount} 顆`)
  ));
  wrap.appendChild(infoCard);

  // Killer 數字
  const killerCard = el('div', { class: 'killer-card' });
  killerCard.appendChild(el('div', { style: 'font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:4px;' }, '本輪殺手數字'));
  killerCard.appendChild(el('div', { class: 'killer-num' }, `${ds.killer}`));
  killerCard.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);margin-top:4px;' }, '骰到就喝一口'));
  wrap.appendChild(killerCard);

  // 輪到誰
  const turnCard = el('div', {
    class: 'card',
    style: 'text-align:center;background:' + (isMyTurn ? 'var(--soft-orange)' : 'var(--card)') + ';'
  });
  if (turnPlayer) {
    turnCard.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;' },
      isMyTurn ? '輪到你' : '輪到'));
    turnCard.appendChild(el('div', { style: 'font-size:18px;font-weight:700;' },
      el('span', { style: 'font-size:24px;margin-right:6px;' }, turnPlayer.emoji),
      turnPlayer.name + (isMyTurn ? ' (你)' : '')
    ));
    if (ds.turnDrinks > 0) {
      turnCard.appendChild(el('div', { style: 'font-size:12px;color:var(--pink);margin-top:6px;font-weight:600;' },
        `本輪已喝 ${ds.turnDrinks} 口 🍻`));
    }
  }
  wrap.appendChild(turnCard);

  // 骰子場景
  const stage = el('div', { class: 'dice-stage', id: 'dice-stage' });
  const showResults = ds.diceValues && !ds.rolling;
  for (let i = 0; i < ds.diceCount; i++) {
    if (showResults) {
      const value = ds.diceValues[i];
      const isHit = value === ds.killer;
      stage.appendChild(makeDiceEl(value, isHit));
    } else if (ds.rolling) {
      // 滾動中：直接放空白骰子，後續用 JS 加 rolling class
      const dice = makeDiceEl(1, false);
      dice.classList.add('rolling');
      dice.style.transform = '';
      stage.appendChild(dice);
    } else {
      // 還沒擲：靜止
      stage.appendChild(makeDiceEl(1, false));
    }
  }
  wrap.appendChild(stage);

  // 動畫播放：onSnapshot 收到 rolling=true + 新的 rollTimestamp → 在本機跑動畫
  if (ds.rolling && ds.rollTimestamp > lastRollTimestamp) {
    lastRollTimestamp = ds.rollTimestamp;
    // 1.2 秒後本機自動停下（顯示結果）
    setTimeout(() => {
      const stageEl = document.getElementById('dice-stage');
      if (!stageEl) return;
      const diceEls = stageEl.querySelectorAll('.dice');
      diceEls.forEach((d, i) => {
        d.classList.remove('rolling');
        const value = ds.diceValues && ds.diceValues[i];
        if (value) {
          const extra = (3 + Math.floor(Math.random() * 3)) * 360;
          d.style.transform = `rotateX(${extra}deg) rotateY(${extra}deg) ${DICE_ROTATIONS[value]}`;
          if (value === ds.killer) d.classList.add('killer-hit');
        }
      });
    }, 1200);
  }

  // 結果與動作
  if (ds.rolling) {
    wrap.appendChild(el('div', { class: 'card center', style: 'color:var(--muted);' }, '骰子滾動中...'));
  } else if (ds.waitingNext === 'continue') {
    // 命中、要繼續擲
    const banner = el('div', {
      class: 'card center',
      style: 'background:var(--soft-pink);color:var(--pink);font-weight:700;'
    });
    const hits = ds.diceValues.filter(v => v === ds.killer).length;
    banner.innerHTML = `🍻 骰到 ${hits} 個 <b>${ds.killer}</b>，喝一口！`;
    wrap.appendChild(banner);

    if (isMyTurn) {
      const continueBtn = el('button', {
        class: 'btn',
        onclick: async () => {
          continueBtn.disabled = true;
          try { await continueRoll(); }
          catch (e) { continueBtn.disabled = false; }
        }
      }, '繼續擲');
      wrap.appendChild(continueBtn);
    } else {
      wrap.appendChild(el('div', {
        style: 'text-align:center;color:var(--muted);padding:10px;font-size:13px;'
      }, `等 ${turnPlayer.emoji} ${turnPlayer.name} 繼續擲...`));
    }
  } else if (ds.waitingNext === 'next') {
    // 沒命中、換下一位
    const banner = el('div', {
      class: 'card center',
      style: 'background:var(--soft-green);color:var(--green);font-weight:700;'
    });
    banner.innerHTML = `✓ 沒骰到 <b>${ds.killer}</b>，安全過關`;
    wrap.appendChild(banner);

    const nextBtn = el('button', {
      class: 'btn',
      onclick: async () => {
        nextBtn.disabled = true;
        try { await advanceToNext(); }
        catch (e) { nextBtn.disabled = false; }
      }
    }, '換下一位');
    wrap.appendChild(nextBtn);
  } else {
    // 還沒擲、等當前玩家
    if (isMyTurn) {
      const rollBtn = el('button', {
        class: 'btn',
        onclick: async () => {
          rollBtn.disabled = true;
          try { await rollDice(); }
          catch (e) { rollBtn.disabled = false; }
        }
      }, '擲骰子！');
      wrap.appendChild(rollBtn);
    } else {
      wrap.appendChild(el('div', {
        style: 'text-align:center;color:var(--muted);padding:14px;font-size:13px;'
      }, `等 ${turnPlayer ? turnPlayer.emoji + ' ' + turnPlayer.name : '其他玩家'} 擲骰子...`));
    }
  }

  // 玩家累計喝口數
  const stats = el('div', { class: 'card' });
  stats.appendChild(el('div', { class: 'label' }, '累計喝口'));
  const sortedByDrinks = [...state.players].sort((a, b) => (b.drinks || 0) - (a.drinks || 0));
  sortedByDrinks.forEach(p => {
    const row = el('div', {
      style: 'display:flex;justify-content:space-between;padding:6px 0;font-size:13px;'
    });
    row.appendChild(el('div', {},
      el('span', { style: 'font-size:16px;margin-right:6px;' }, p.emoji),
      el('span', {}, p.name + (p.id === myPlayerId ? ' (你)' : ''))
    ));
    row.appendChild(el('span', { style: 'font-weight:700;color:var(--accent);' }, `${p.drinks || 0} 口`));
    stats.appendChild(row);
  });
  wrap.appendChild(stats);

  // 結束按鈕
  const endBtn = el('button', {
    class: 'btn btn-ghost',
    onclick: async () => {
      if (await customConfirm('要結束這場遊戲嗎？', { okText: '結束', danger: true })) {
        await endDiceGame();
      }
    }
  }, '結束遊戲');
  wrap.appendChild(endBtn);

  return wrap;
}

  const item = (label, onclick, danger) => {
    const e = el('button', {
      style: `display:block;width:100%;text-align:left;background:none;border:none;color:${danger ? 'var(--red)' : 'var(--ink)'};padding:10px 14px;font-size:14px;cursor:pointer;border-radius:8px;font-family:inherit;`,
      onclick: () => {
        document.getElementById('floating-menu')?.remove();
        onclick();
      }
    }, label);
    e.onmouseenter = () => e.style.background = 'var(--card-light)';
    e.onmouseleave = () => e.style.background = 'none';
    return e;
  };

  if (getMe()) {
    menu.appendChild(item('改名字 / 頭像', () => showProfileEdit()));
  }
  menu.appendChild(item('離開房間', () => leaveRoom(), true));

  document.body.appendChild(menu);

  setTimeout(() => {
    const close = (e) => {
      if (!menu.contains(e.target) && e.target.className !== 'menu-btn') {
        menu.remove();
        document.removeEventListener('click', close);
      }
    };
    document.addEventListener('click', close);
  }, 0);
}

// ============ Profile Edit Modal ============
function showProfileEdit() {
  const me = getMe();
  if (!me) return;

  const old = document.getElementById('profile-modal');
  if (old) old.remove();

  let chosenEmoji = me.emoji;

  const overlay = el('div', { id: 'profile-modal', class: 'modal-overlay' });
  const modal = el('div', { class: 'modal' });

  modal.appendChild(el('div', { style: 'font-size:16px;font-weight:700;margin-bottom:14px;' }, '改名字 / 頭像'));

  const nameInput = el('input', {
    class: 'input',
    style: 'margin-bottom:14px;',
    placeholder: '暱稱',
    maxlength: '10',
    value: me.name
  });
  modal.appendChild(nameInput);

  modal.appendChild(el('div', { style: 'font-size:11px;color:var(--muted);margin-bottom:8px;' }, '頭像'));

  const grid = el('div', { class: 'emoji-grid' });
  function renderTiles() {
    grid.innerHTML = '';
    PRESET_EMOJIS.forEach(emoji => {
      const tile = el('div', {
        class: 'emoji-tile' + (emoji === chosenEmoji ? ' selected' : ''),
        onclick: () => {
          chosenEmoji = emoji;
          customInput.value = '';
          renderTiles();
        }
      }, emoji);
      grid.appendChild(tile);
    });
  }
  renderTiles();
  modal.appendChild(grid);

  const customInput = el('input', {
    class: 'input',
    style: 'margin-top:10px;text-align:center;font-size:22px;',
    placeholder: '或自訂',
    maxlength: '20',
    oninput: function() {
      const v = this.value.trim();
      if (v) { chosenEmoji = v; renderTiles(); }
    }
  });
  modal.appendChild(customInput);

  const btnRow = el('div', { style: 'display:flex;gap:8px;margin-top:16px;' });
  const cancelBtn = el('button', {
    class: 'btn btn-ghost', style: 'flex:1;',
    onclick: () => overlay.remove()
  }, '取消');
  const saveBtn = el('button', {
    class: 'btn', style: 'flex:1;',
    onclick: async () => {
      const name = nameInput.value.trim();
      if (!name) { alert('名字不能空白'); return; }
      saveBtn.disabled = true;
      saveBtn.textContent = '儲存中...';
      try {
        const fresh = await loadRoom();
        if (!fresh) { overlay.remove(); return; }
        state = fresh;
        const idx = state.players.findIndex(p => p.id === myPlayerId);
        if (idx >= 0) {
          state.players[idx].name = name;
          state.players[idx].emoji = chosenEmoji;
          saveMe(state.players[idx]);
          await saveRoom();
        }
        overlay.remove();
        render();
      } catch (e) {
        alert('儲存失敗：' + e.message);
        saveBtn.disabled = false;
        saveBtn.textContent = '儲存';
      }
    }
  }, '儲存');
  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(saveBtn);
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

// ============ Business Logic ============

async function enterRoom(code) {
  roomCode = code;
  saveRoomCode(code);

  // 立即顯示「連線中」畫面，避免使用者覺得卡住
  state = null;
  render();

  // 嘗試載入既有房間
  const existing = await loadRoom();

  if (existing) {
    state = existing;
  } else {
    // 新房間
    state = {
      roomCode: code,
      createdAt: Date.now(),
      status: 'waiting',
      players: [],
      currentRound: null,
      usedIndices: [],
      history: []
    };
    await saveRoom();
  }

  // 嘗試恢復我的身分
  const saved = loadMe();
  if (saved && state.players) {
    const matched = state.players.find(p => p.id === saved.id);
    if (matched) {
      // 我之前在這個房間 → 自動回來、標記 online
      // 再撈一次 fresh 避免覆蓋對方剛改的東西
      const fresh2 = await loadRoom();
      if (fresh2) {
        state = fresh2;
        const idx = state.players.findIndex(p => p.id === saved.id);
        if (idx >= 0) {
          myPlayerId = saved.id;
          state.players[idx].online = true;
          await saveRoom();
        }
      }
    }
  }

  subscribeRoom();
  render();
}

async function joinAsPlayer(name, emoji) {
  // 重撈最新狀態
  const fresh = await loadRoom();
  if (!fresh) throw new Error('房間消失了');
  state = fresh;

  if (state.status !== 'waiting') throw new Error('遊戲已開始');
  if (!state.players) state.players = [];
  if (state.players.length >= 5) throw new Error('房間已滿');

  const newPlayer = {
    id: makeId('p'),
    name: name.slice(0, 10),
    emoji,
    joinedAt: Date.now(),
    online: true,
    score: 0,
    streak: 0
  };
  state.players.push(newPlayer);
  myPlayerId = newPlayer.id;
  saveMe(newPlayer);
  await saveRoom();
  render();
}

async function startGame() {
  const fresh = await loadRoom();
  if (!fresh) throw new Error('房間消失了');
  state = fresh;
  if (state.status === 'playing') {
    render();
    return;
  }
  if (!state.players || state.players.length < 2) throw new Error('至少 2 人');
  if (!state.gameType) throw new Error('還沒選遊戲');

  state.status = 'playing';

  if (state.gameType === 'dice') {
    initDiceGame();
  } else if (state.gameType === 'quiz') {
    initQuizGame();
  } else {
    // 默契猜猜
    state.usedIndices = state.usedIndices || [];
    state.history = state.history || [];
    state.players.forEach(p => { p.score = 0; p.streak = 0; });
    pickAndSetNewRound(1);
  }

  await saveRoom();
  render();
}

// ============ Dice Game Logic ============
function initDiceGame() {
  // 隨機 player 起始順序
  const shuffledIds = shuffle(state.players.map(p => p.id));
  // 每人喝口數歸零
  state.players.forEach(p => {
    p.drinks = 0;
  });

  state.diceState = {
    roundNum: 1,                       // 第幾輪（1-5）
    diceCount: 3,                      // 這輪骰子數量
    killer: Math.floor(Math.random() * 6) + 1,  // 殺手數字
    playerOrder: shuffledIds,          // 玩家順序
    currentTurnIdx: 0,                 // 目前輪到第幾個 (index of playerOrder)
    diceValues: null,                  // 最後一次擲出的點數陣列
    rolling: false,                    // 是否擲骰子動畫中
    rollerId: null,                    // 誰擲的（驗證用）
    rollTimestamp: 0,                  // 擲骰時間戳（觸發動畫）
    turnDrinks: 0,                     // 這位玩家本輪喝的口數（重置：換人時歸零）
    gameOver: false
  };
}

function getCurrentTurnPlayer() {
  if (!state.diceState) return null;
  const id = state.diceState.playerOrder[state.diceState.currentTurnIdx];
  return getPlayer(id);
}

async function rollDice() {
  // 只有當前 turn 玩家能擲、且不在 rolling 中
  const fresh = await loadRoom();
  if (!fresh || !fresh.diceState) return;
  state = fresh;

  const ds = state.diceState;
  if (ds.gameOver) return;
  if (ds.rolling) return;  // 已經在擲了
  if (ds.playerOrder[ds.currentTurnIdx] !== myPlayerId) {
    alert('還沒輪到你');
    return;
  }

  // 隨機骰子
  const values = [];
  for (let i = 0; i < ds.diceCount; i++) {
    values.push(Math.floor(Math.random() * 6) + 1);
  }

  ds.rolling = true;
  ds.rollerId = myPlayerId;
  ds.rollTimestamp = Date.now();
  ds.diceValues = values;
  await saveRoom();
  render();

  // 動畫播完後（1.7 秒）由本機處理結果
  setTimeout(async () => {
    await finishRollAnimation();
  }, 1900);
}

async function finishRollAnimation() {
  const fresh = await loadRoom();
  if (!fresh || !fresh.diceState) return;
  state = fresh;
  const ds = state.diceState;
  if (!ds.rolling) return;

  // 計算殺手數字命中
  const hitCount = ds.diceValues.filter(v => v === ds.killer).length;

  ds.rolling = false;

  if (hitCount > 0) {
    // 命中 → 該玩家喝一口、turnDrinks +1、累計也 +1
    const me = state.players.find(p => p.id === ds.playerOrder[ds.currentTurnIdx]);
    if (me) {
      me.drinks = (me.drinks || 0) + 1;
    }
    ds.turnDrinks = (ds.turnDrinks || 0) + 1;
    // 等使用者按「繼續擲」（或自動進入下一次擲）→ 先暫停 render 顯示結果
    ds.waitingNext = 'continue';  // 給 UI 用：要顯示「繼續擲」按鈕
  } else {
    // 沒命中 → 換下一位玩家
    ds.waitingNext = 'next';  // 要顯示「換下一位」按鈕
  }

  await saveRoom();
  render();
}

async function continueRoll() {
  // 同玩家繼續擲：清掉 waitingNext、按 rollDice 流程
  const fresh = await loadRoom();
  if (!fresh || !fresh.diceState) return;
  state = fresh;
  if (state.diceState.playerOrder[state.diceState.currentTurnIdx] !== myPlayerId) {
    alert('還沒輪到你');
    return;
  }
  state.diceState.waitingNext = null;
  state.diceState.diceValues = null;
  await saveRoom();
  render();
}

async function advanceToNext() {
  // 沒命中後按「下一位」（任何在線玩家都能按以加快節奏）
  const fresh = await loadRoom();
  if (!fresh || !fresh.diceState) return;
  state = fresh;
  const ds = state.diceState;

  // 換下一位玩家
  ds.currentTurnIdx++;
  ds.turnDrinks = 0;
  ds.waitingNext = null;
  ds.diceValues = null;

  // 檢查這輪是不是結束了
  if (ds.currentTurnIdx >= ds.playerOrder.length) {
    // 這輪結束 → 進下一輪 or 遊戲結束
    if (ds.roundNum >= 5) {
      // 遊戲結束
      ds.gameOver = true;
      state.status = 'ended';
    } else {
      ds.roundNum++;
      ds.diceCount++;
      ds.killer = Math.floor(Math.random() * 6) + 1;
      ds.currentTurnIdx = 0;
      ds.playerOrder = shuffle(state.players.map(p => p.id));  // 重新洗順序
    }
  }

  await saveRoom();
  render();
}

async function endDiceGame() {
  const fresh = await loadRoom();
  if (!fresh) return;
  state = fresh;
  state.status = 'ended';
  if (state.diceState) state.diceState.gameOver = true;
  await saveRoom();
  render();
}

// ============ Quiz Game Logic ============
const QUIZ_TOTAL = 15;        // 一場 15 題
const QUIZ_TIME = 65;          // 每題 65 秒
const QUIZ_CATEGORY_NAMES = {
  chinese: '📚 國文',
  english: '🔤 英文',
  trivia: '🧩 冷知識'
};

function initQuizGame() {
  // 抽 15 題（排除房間用過的 quiz 題）
  if (!state.usedQuizIndices) state.usedQuizIndices = [];
  let available = QUIZ_QUESTIONS.map((q, i) => ({ q, i }))
    .filter(x => !state.usedQuizIndices.includes(x.i));
  if (available.length < QUIZ_TOTAL) {
    state.usedQuizIndices = [];
    available = QUIZ_QUESTIONS.map((q, i) => ({ q, i }));
  }
  // 隨機抽 15
  const picked = shuffle(available).slice(0, QUIZ_TOTAL);
  // 記錄用過的
  picked.forEach(p => state.usedQuizIndices.push(p.i));

  state.players.forEach(p => { p.score = 0; });

  state.quizState = {
    questions: picked.map(p => ({
      cat: p.q.cat,
      q: p.q.q,
      options: p.q.options,
      correct: p.q.correct
    })),
    currentIdx: 0,
    answers: {},  // { questionIdx: { playerId: optionIdx } }
    revealed: {},  // { questionIdx: true }
    startedAt: {},
    gameOver: false
  };
  state.quizState.startedAt[0] = Date.now();
}

async function submitQuizAnswer(answer) {
  const fresh = await loadRoom();
  if (!fresh || !fresh.quizState) return;
  state = fresh;
  const qs = state.quizState;
  if (qs.revealed[qs.currentIdx]) return;
  if (!qs.answers[qs.currentIdx]) qs.answers[qs.currentIdx] = {};
  if (qs.answers[qs.currentIdx][myPlayerId] != null) return; // 已答
  qs.answers[qs.currentIdx][myPlayerId] = answer;

  // 檢查是否所有在線玩家答完
  const onlinePlayers = state.players.filter(p => p.online);
  const allAnswered = onlinePlayers.every(p => qs.answers[qs.currentIdx][p.id] != null);

  if (allAnswered && !qs.revealed[qs.currentIdx]) {
    revealQuizAnswer();
  }

  await saveRoom();
  render();
}

function revealQuizAnswer() {
  const qs = state.quizState;
  if (qs.revealed[qs.currentIdx]) return;
  qs.revealed[qs.currentIdx] = true;

  const correctIdx = qs.questions[qs.currentIdx].correct;
  const ans = qs.answers[qs.currentIdx] || {};

  // 計分
  state.players.forEach(p => {
    if (ans[p.id] === correctIdx) {
      p.score = (p.score || 0) + 1;
    }
  });
}

async function handleQuizTimeout() {
  const fresh = await loadRoom();
  if (!fresh || !fresh.quizState) return;
  state = fresh;
  const qs = state.quizState;
  if (qs.revealed[qs.currentIdx]) return;
  if (qs.questions[qs.currentIdx] == null) return;

  // 沒答的人寫入 null
  if (!qs.answers[qs.currentIdx]) qs.answers[qs.currentIdx] = {};
  state.players.forEach(p => {
    if (p.online && qs.answers[qs.currentIdx][p.id] == null) {
      qs.answers[qs.currentIdx][p.id] = null; // null 表示沒答
    }
  });
  revealQuizAnswer();
  await saveRoom();
  render();
}

async function nextQuizQuestion() {
  const fresh = await loadRoom();
  if (!fresh || !fresh.quizState) return;
  state = fresh;
  const qs = state.quizState;
  if (!qs.revealed[qs.currentIdx]) return;

  if (qs.currentIdx >= QUIZ_TOTAL - 1) {
    // 結束
    qs.gameOver = true;
    state.status = 'ended';
  } else {
    qs.currentIdx++;
    qs.startedAt[qs.currentIdx] = Date.now();
  }
  await saveRoom();
  render();
}

async function endQuizGame() {
  const fresh = await loadRoom();
  if (!fresh) return;
  state = fresh;
  state.status = 'ended';
  if (state.quizState) state.quizState.gameOver = true;
  await saveRoom();
  render();
}

// ============ Quiz Render ============
let quizMyStartedQ = -1;
let quizMyStartTime = null;
let quizCountdownInterval = null;

function stopQuizCountdown() {
  if (quizCountdownInterval) {
    clearInterval(quizCountdownInterval);
    quizCountdownInterval = null;
  }
}

function startQuizCountdown(fillEl, textEl) {
  stopQuizCountdown();
  if (!quizMyStartTime) quizMyStartTime = Date.now();

  function tick() {
    const elapsed = (Date.now() - quizMyStartTime) / 1000;
    const seconds = Math.max(0, Math.ceil(QUIZ_TIME - elapsed));
    const pct = (seconds / QUIZ_TIME) * 100;
    fillEl.style.width = pct + '%';
    if (seconds > 30) fillEl.style.background = 'var(--green)';
    else if (seconds > 10) fillEl.style.background = 'var(--gold)';
    else fillEl.style.background = 'var(--red)';
    textEl.textContent = `${seconds}s`;
    textEl.style.color = seconds <= 10 ? 'var(--red)' : 'var(--ink)';

    if (elapsed >= QUIZ_TIME) {
      stopQuizCountdown();
      handleQuizTimeout();
    }
  }

  tick();
  quizCountdownInterval = setInterval(tick, 250);
}

function renderQuizPlaying() {
  const wrap = el('div');
  const qs = state.quizState;
  if (!qs || !qs.questions) {
    wrap.appendChild(el('div', { class: 'card center' }, '初始化遊戲中…'));
    return wrap;
  }

  const idx = qs.currentIdx;
  const q = qs.questions[idx];
  const isRevealed = qs.revealed[idx];
  const myAnswer = (qs.answers[idx] || {})[myPlayerId];
  const correctIdx = q.correct;

  // 進度
  const progCard = el('div', {
    class: 'card',
    style: 'display:flex;justify-content:space-between;align-items:center;'
  });
  progCard.appendChild(el('div', {},
    el('div', { style: 'font-size:11px;color:var(--muted);letter-spacing:1px;' }, '進度'),
    el('div', { style: 'font-size:18px;font-weight:700;margin-top:2px;' }, `${idx + 1} / ${QUIZ_TOTAL}`)
  ));
  const catName = QUIZ_CATEGORY_NAMES[q.cat] || q.cat;
  progCard.appendChild(el('div', { style: 'text-align:right;' },
    el('div', { style: 'font-size:11px;color:var(--muted);letter-spacing:1px;' }, '類別'),
    el('div', { style: 'font-size:14px;font-weight:700;margin-top:2px;' }, catName)
  ));
  wrap.appendChild(progCard);

  // Timer（僅未揭曉時顯示）
  if (!isRevealed && myAnswer == null) {
    const timerWrap = el('div', { class: 'timer-wrap' });
    const timerLabel = el('div', { class: 'timer-label' });
    timerLabel.appendChild(el('span', {}, '⏱️ 剩餘時間'));
    const timerCount = el('span', { style: 'font-weight:700;color:var(--ink);' }, `${QUIZ_TIME}s`);
    timerLabel.appendChild(timerCount);
    timerWrap.appendChild(timerLabel);
    const timerBar = el('div', { class: 'timer-bar' });
    const timerFill = el('div', { class: 'timer-fill', style: 'width:100%;background:var(--green);' });
    timerBar.appendChild(timerFill);
    timerWrap.appendChild(timerBar);
    wrap.appendChild(timerWrap);

    if (quizMyStartedQ !== idx) {
      quizMyStartedQ = idx;
      quizMyStartTime = Date.now();
    }
    startQuizCountdown(timerFill, timerCount);
  } else {
    stopQuizCountdown();
  }

  // 題目卡
  const qCard = el('div', { class: 'card' });
  qCard.appendChild(el('div', { class: 'question' }, q.q));
  wrap.appendChild(qCard);

  // 選項
  const optsCard = el('div', { class: 'card' });
  const optsList = el('div', { class: 'options' });
  ['A', 'B', 'C', 'D'].forEach((letter, i) => {
    let cls = 'option';
    let extra = '';
    if (isRevealed) {
      // 揭曉狀態：正確答案綠色、我選的錯的紅色
      if (i === correctIdx) {
        extra = 'background:var(--soft-green);border-color:var(--green);color:var(--green);font-weight:700;';
      } else if (myAnswer === i) {
        extra = 'background:var(--soft-red);border-color:var(--red);color:var(--red);';
      }
    } else if (myAnswer === i) {
      cls += ' selected';
    }
    const btn = el('button', {
      class: cls,
      style: extra,
      onclick: async () => {
        if (isRevealed || myAnswer != null) return;
        stopQuizCountdown();
        await submitQuizAnswer(i);
      }
    });
    btn.innerHTML = `<b style="margin-right:8px;">${letter}.</b> ${escapeHtml(q.options[i])}`;
    if (isRevealed && i === correctIdx) {
      btn.innerHTML += ' <span style="margin-left:8px;">✓</span>';
    } else if (isRevealed && myAnswer === i && i !== correctIdx) {
      btn.innerHTML += ' <span style="margin-left:8px;">✗</span>';
    }
    optsList.appendChild(btn);
  });
  optsCard.appendChild(optsList);
  wrap.appendChild(optsCard);

  // 狀態 + 動作
  if (isRevealed) {
    // 揭曉後：顯示每個人答了什麼 + 下一題
    const ans = qs.answers[idx] || {};
    const banner = el('div', { class: 'card', style: 'background:var(--bg);' });
    banner.appendChild(el('div', { class: 'label' }, '本題結果'));
    state.players.forEach(p => {
      const pAns = ans[p.id];
      const got = pAns === correctIdx;
      const row = el('div', {
        style: 'display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;'
      });
      row.appendChild(el('div', {},
        el('span', { style: 'font-size:16px;margin-right:6px;' }, p.emoji),
        el('span', {}, p.name + (p.id === myPlayerId ? ' (你)' : ''))
      ));
      const detail = el('div', { style: 'display:flex;align-items:center;gap:6px;' });
      if (pAns == null) {
        detail.appendChild(el('span', { style: 'color:var(--muted);font-size:11px;' }, '沒答到'));
      } else {
        detail.appendChild(el('span', { style: 'color:var(--muted);font-size:11px;' }, `選 ${'ABCD'[pAns]}`));
      }
      detail.appendChild(el('span', {
        style: `color:${got ? 'var(--green)' : 'var(--red)'};font-weight:700;font-size:16px;`
      }, got ? '✓' : '✗'));
      row.appendChild(detail);
      banner.appendChild(row);
    });
    wrap.appendChild(banner);

    // 即時排名
    const ranked = [...state.players].sort((a, b) => (b.score || 0) - (a.score || 0));
    const rankCard = el('div', { class: 'card' });
    rankCard.appendChild(el('div', { class: 'label' }, '目前分數'));
    ranked.forEach((p, i) => {
      const row = el('div', { style: 'display:flex;justify-content:space-between;padding:5px 0;font-size:13px;' });
      row.appendChild(el('div', {},
        el('span', { style: 'color:var(--muted);margin-right:8px;' }, `${i + 1}.`),
        el('span', { style: 'font-size:16px;margin-right:4px;' }, p.emoji),
        el('span', {}, p.name + (p.id === myPlayerId ? ' (你)' : ''))
      ));
      row.appendChild(el('span', { style: 'font-weight:700;color:var(--accent);' }, `${p.score || 0} 分`));
      rankCard.appendChild(row);
    });
    wrap.appendChild(rankCard);

    if (idx < QUIZ_TOTAL - 1) {
      const nextBtn = el('button', {
        class: 'btn',
        onclick: async () => {
          nextBtn.disabled = true;
          try { await nextQuizQuestion(); }
          catch (e) { nextBtn.disabled = false; }
        }
      }, '下一題');
      wrap.appendChild(nextBtn);
    } else {
      const finishBtn = el('button', {
        class: 'btn',
        onclick: async () => {
          finishBtn.disabled = true;
          try { await nextQuizQuestion(); }
          catch (e) { finishBtn.disabled = false; }
        }
      }, '看結果 🏆');
      wrap.appendChild(finishBtn);
    }
  } else if (myAnswer != null) {
    // 我答完，等其他人
    wrap.appendChild(el('div', {
      class: 'card center',
      style: 'padding:24px 16px;'
    },
      el('div', { style: 'font-size:24px;margin-bottom:6px;' }, '⌛'),
      el('div', { style: 'font-size:14px;font-weight:600;' }, '等其他人作答...')
    ));

    // 顯示誰答了
    const list = el('div', { style: 'display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px;' });
    const ans = qs.answers[idx] || {};
    state.players.forEach(p => {
      const answered = ans[p.id] != null;
      const chip = el('div', { class: 'player-chip' + (p.online ? '' : ' offline') });
      chip.appendChild(el('span', { class: 'player-emoji' }, p.emoji));
      chip.appendChild(el('span', {}, p.name));
      chip.appendChild(el('span', {
        class: 'player-dot ' + (answered ? 'answered' : ''),
        style: answered ? '' : 'background:var(--muted);'
      }));
      list.appendChild(chip);
    });
    wrap.appendChild(list);
  }

  // 結束按鈕（提早終止）
  const endBtn = el('button', {
    class: 'btn btn-ghost',
    style: 'margin-top:10px;',
    onclick: async () => {
      if (await customConfirm('要結束這場遊戲嗎？', { okText: '結束', danger: true })) {
        await endQuizGame();
      }
    }
  }, '結束遊戲');
  wrap.appendChild(endBtn);

  return wrap;
}

function pickAndSetNewRound(roundNum) {
  // 抽題：排除這個房間玩過的題
  let available = QUESTIONS.map((q, i) => ({ q, i }))
    .filter(x => !state.usedIndices.includes(x.i));
  if (available.length === 0) {
    // 全部玩完了 → 重置
    state.usedIndices = [];
    available = QUESTIONS.map((q, i) => ({ q, i }));
  }
  const pick = available[Math.floor(Math.random() * available.length)];

  state.currentRound = {
    roundNum,
    questionIdx: pick.i,
    question: { q: pick.q.q, a: pick.q.a, b: pick.q.b, cat: pick.q.cat },
    answers: {},
    startedAt: Date.now(),
    revealed: false,
    ackedBy: []
  };
  state.usedIndices.push(pick.i);
}

async function submitMyAnswer(answer, guesses) {
  // 重撈最新避免覆蓋
  const fresh = await loadRoom();
  if (!fresh || !fresh.currentRound) return;
  state = fresh;
  if (!state.currentRound.answers) state.currentRound.answers = {};
  state.currentRound.answers[myPlayerId] = { answer, guesses };

  // 檢查是否所有「在線玩家」都答完
  const onlinePlayers = state.players.filter(p => p.online);
  const allAnswered = onlinePlayers.every(p => state.currentRound.answers[p.id]);

  if (allAnswered && !state.currentRound.revealed) {
    doReveal();
  }

  await saveRoom();
  render();
}

function doReveal() {
  if (!state.currentRound || state.currentRound.revealed) return;
  state.currentRound.revealed = true;

  // 計分：每位玩家對每個其他玩家猜對 → +1 分；全猜對 +2 bonus
  state.players.forEach(p => {
    const ans = state.currentRound.answers[p.id];
    if (!ans || ans.timeout) {
      p.streak = 0;
      return;
    }
    const guesses = ans.guesses || {};
    const otherPlayers = state.players.filter(other => other.id !== p.id);
    let correctCount = 0;
    let totalGuessable = 0;
    otherPlayers.forEach(other => {
      const otherAns = state.currentRound.answers[other.id];
      // 其他人沒答到 → 該對不能計分
      if (!otherAns || otherAns.timeout || otherAns.answer == null) return;
      totalGuessable++;
      if (guesses[other.id] && guesses[other.id] === otherAns.answer) {
        correctCount++;
      }
    });
    p.score = (p.score || 0) + correctCount;
    // Perfect bonus：必須有至少 1 個可猜的對象、且全猜對
    if (totalGuessable > 0 && correctCount === totalGuessable) {
      p.score += 2;
      p.lastPerfect = true;
      p.streak = (p.streak || 0) + 1;
    } else {
      p.lastPerfect = false;
      if (correctCount === 0) p.streak = 0;
    }
  });

  // 加入 history
  if (!state.history) state.history = [];
  state.history.push({
    questionIdx: state.currentRound.questionIdx,
    question: state.currentRound.question,
    answers: { ...state.currentRound.answers },
    at: Date.now()
  });
  // 只留最近 50 筆
  if (state.history.length > 50) state.history = state.history.slice(-50);
}

async function handleTimeout() {
  // 倒數結束 → 自動送出（如果有選擇）或標記為「沒答」
  const fresh = await loadRoom();
  if (!fresh || !fresh.currentRound) return;
  state = fresh;
  if (state.currentRound.questionIdx !== myRoundStartedQ) return;
  if (state.currentRound.revealed) return;
  if (state.currentRound.answers && state.currentRound.answers[myPlayerId]) return;

  // 超時：盡量保留已選的答案 + 猜測
  if (!state.currentRound.answers) state.currentRound.answers = {};
  state.currentRound.answers[myPlayerId] = {
    answer: pendingAnswer || null,
    guesses: { ...pendingGuesses },
    timeout: true
  };

  // 檢查是否所有人都答完（含超時）
  const onlinePlayers = state.players.filter(p => p.online);
  const allDone = onlinePlayers.every(p => state.currentRound.answers[p.id]);
  if (allDone && !state.currentRound.revealed) {
    doReveal();
  }

  myRoundStartedQ = null;
  myRoundStartTime = null;
  pendingAnswer = null;
  pendingGuesses = {};
  await saveRoom();
  render();
}

async function nextRound() {
  const fresh = await loadRoom();
  if (!fresh) return;
  state = fresh;
  if (!state.currentRound || !state.currentRound.revealed) {
    // 已經被別人抽下一題了
    render();
    return;
  }
  if (state.status !== 'playing') return;

  const nextNum = (state.currentRound.roundNum || 0) + 1;
  pickAndSetNewRound(nextNum);
  await saveRoom();
  render();
}

async function endGame() {
  const fresh = await loadRoom();
  if (!fresh) return;
  state = fresh;
  state.status = 'ended';
  await saveRoom();
  render();
}

async function restartGame() {
  const fresh = await loadRoom();
  if (!fresh) return;
  state = fresh;
  state.status = 'waiting';
  state.currentRound = null;
  // 保留 usedIndices：再玩一局時不重複出已玩過的題目
  // state.usedIndices / state.usedQuizIndices 不清，會持續累積
  state.history = [];
  state.diceState = null;
  state.quizState = null;
  state.players.forEach(p => {
    p.score = 0;
    p.streak = 0;
    p.drinks = 0;
  });
  // 自動重新開始遊戲（保留 gameType）
  if (state.gameType === 'dice') {
    state.status = 'playing';
    initDiceGame();
  } else if (state.gameType === 'quiz') {
    state.status = 'playing';
    initQuizGame();
  } else if (state.gameType) {
    // mochi
    state.status = 'playing';
    pickAndSetNewRound(1);
  }
  await saveRoom();
  render();
}

async function leaveRoom() {
  if (await customConfirm('要離開房間嗎？\n（你的暱稱還會留著，重新進房可以接回）')) {
    // 標記 offline 但不刪除
    if (myPlayerId && state) {
      try {
        const fresh = await loadRoom();
        if (fresh) {
          state = fresh;
          const idx = state.players.findIndex(p => p.id === myPlayerId);
          if (idx >= 0) state.players[idx].online = false;
          await saveRoom();
        }
      } catch (e) { /* ignore */ }
    }
    if (unsub) { unsub(); unsub = null; }
    roomCode = null;
    myPlayerId = null;
    state = null;
    render();
  }
}

// ============ Countdown ============
function stopCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function startCountdown(fillEl, textEl) {
  stopCountdown();
  if (!myRoundStartTime) myRoundStartTime = Date.now();

  function tick() {
    const elapsed = (Date.now() - myRoundStartTime) / 1000;
    const seconds = Math.max(0, Math.ceil(getRoundTime() - elapsed));
    const pct = (seconds / getRoundTime()) * 100;
    fillEl.style.width = pct + '%';
    if (seconds > 15) fillEl.style.background = 'var(--green)';
    else if (seconds > 7) fillEl.style.background = 'var(--gold)';
    else fillEl.style.background = 'var(--red)';
    textEl.textContent = `${seconds}s`;
    textEl.style.color = seconds <= 7 ? 'var(--red)' : 'var(--ink)';

    if (elapsed >= getRoundTime()) {
      stopCountdown();
      handleTimeout();
    }
  }

  tick();
  countdownInterval = setInterval(tick, 250);
}

// 離開頁面時標記 offline
window.addEventListener('beforeunload', () => {
  if (myPlayerId && state && roomCode) {
    const idx = state.players.findIndex(p => p.id === myPlayerId);
    if (idx >= 0) {
      state.players[idx].online = false;
      // beforeunload 沒辦法等 async，盡力而為
      setDoc(doc(db, 'partyRooms', roomCode), state).catch(() => {});
    }
  }
});

// ============ Init ============
render();

</script>
